<script>
const STORAGE_KEY = 'genkou-mission-v3';
const DIFF_H = { low:1, mid:2, high:4 };
const HOURS_PER_DAY = 5;

function dateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
const WJ=['日','月','火','水','木','金','土'];
function fmtDate(s){ const d=parseDate(s); return (d.getMonth()+1)+'/'+d.getDate()+'('+WJ[d.getDay()]+')'; }

const FIXED_ZERO = {'2026-07-29':'ジム後','2026-08-07':'ゴッホ展','2026-08-30':'フェス'};
const TENT_ZERO  = {'2026-07-26':'コラボカフェ(仮)','2026-08-17':'USJ(仮)','2026-08-18':'USJ翌日(仮)'};
function isZero(k){ return !!(FIXED_ZERO[k]||TENT_ZERO[k]); }
function zeroLabel(k){ return FIXED_ZERO[k]||TENT_ZERO[k]||null; }
function isEarlyNight(k){ const d=parseDate(k).getDay(); return d===1||d===3||d===5; }

// -------- スケジュール生成（難易度インターリーブ）--------
function buildSchedule(panels, startStr, endStr){
  const usable=[];
  let cur=parseDate(startStr), end=parseDate(endStr);
  while(cur<=end){ const k=dateKey(cur); if(!isZero(k)) usable.push(k); cur=addDays(cur,1); }
  if(!usable.length) return {};
  const todo=panels.filter(p=>!p.locked);
  const high=todo.filter(p=>p.difficulty==='high');
  const mid =todo.filter(p=>p.difficulty==='mid');
  const low =todo.filter(p=>p.difficulty==='low');
  const ordered=[];
  const mx=Math.max(high.length,mid.length,low.length);
  for(let i=0;i<mx;i++){
    if(i<high.length) ordered.push(high[i]);
    if(i<mid.length)  ordered.push(mid[i]);
    if(i<low.length)  ordered.push(low[i]);
  }
  const perDay=Math.max(1,Math.ceil(ordered.length/usable.length));
  const map={};
  usable.forEach(d=>{ map[d]=[]; });
  let idx=0;
  for(const day of usable){
    for(let i=0;i<perDay&&idx<ordered.length;i++){ map[day].push(ordered[idx].id); idx++; }
  }
  return map;
}

    {id:'P11-c1',page:'P11',label:'1',difficulty:'mid',locked:true},{id:'P11-c2',page:'P11',label:'2',difficulty:'mid',locked:true},{id:'P11-c3',page:'P11',label:'3',difficulty:'mid',locked:true},{id:'P11-c4',page:'P11',label:'4',difficulty:'mid',locked:true},
    {id:'P11-c5',page:'P11',label:'5(下書き中)',difficulty:'mid',locked:false},{id:'P11-c6',page:'P11',label:'6',difficulty:'mid',locked:false},
    {id:'P12-c1',page:'P12',label:'1',difficulty:'mid',locked:true},

    {id:'P14-c1',page:'P14',label:'1(下書き済)',difficulty:'mid',locked:false},

// -------- 状態管理 --------
function loadState(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){}
  return {manuscripts:[buildSept(),buildOct()],activeId:'sept'};
}
function saveState(s){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }catch(e){} }

let STATE = loadState();

function getMs(){ return STATE.manuscripts.find(m=>m.id===STATE.activeId); }

// -------- 紙吹雪 --------
function launchConfetti(){
  const container=document.getElementById('confetti');
  const colors=['#d4744a','#e8a456','#5fae6e','#a8b8e8','#e8e3d9','#e8c34a'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.width=(6+Math.random()*10)+'px';
    el.style.height=(6+Math.random()*10)+'px';
    el.style.animationDuration=(0.8+Math.random()*1.5)+'s';
    el.style.animationDelay=(Math.random()*0.5)+'s';
    container.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }
}

// -------- カレンダー色計算 --------
function calendarColors(ms){
  // 各日付に何時間分の作業が完了したか（難易度換算）
  // locked済みパネルのidをスケジュールの日付にマッピング
  const panelToDay={};
  Object.entries(ms.schedule).forEach(([day,ids])=>{ ids.forEach(id=>{ panelToDay[id]=day; }); });
  const dayHours={};
  ms.panels.filter(p=>p.locked).forEach(p=>{
    const day=panelToDay[p.id];
    if(day){ dayHours[day]=(dayHours[day]||0)+DIFF_H[p.difficulty||'mid']; }
  });
  return dayHours;
}

// -------- 統計 --------
function computeStats(ms){
  const total=ms.panels.length;
  const done=ms.panels.filter(p=>p.locked).length;
  const doneH=ms.panels.filter(p=>p.locked).reduce((s,p)=>s+DIFF_H[p.difficulty||'mid'],0);
  const totalH=ms.panels.reduce((s,p)=>s+DIFF_H[p.difficulty||'mid'],0);
  const today=dateKey(new Date());
  const deadline=ms.deadline;
  const daysLeft=Math.max(0,Math.round((parseDate(deadline)-new Date())/86400000));
  // 信号
  const remainH=totalH-doneH;
  const futureDays=Object.keys(ms.schedule).filter(k=>k>=today).length;
  const availH=futureDays*HOURS_PER_DAY;
  let signal='green';
  if(remainH>0){
    const ratio=availH>0?remainH/availH:999;
    if(ratio>0.9) signal='red';
    else if(ratio>0.6) signal='yellow';
  }
  return {total,done,doneH,totalH,remainH,daysLeft,signal};
}

// -------- レンダリング --------
let confirmTarget=null;
let expandedDay=dateKey(new Date());
let showSettings=false;
let showCalendar=false;
let deleteConfirm=null;
let showAddForm=false;

function render(){
  const app=document.getElementById('app');
  const ms=getMs();
  if(!ms){ app.innerHTML='<div style="padding:40px;text-align:center;color:#9b9389">原稿を追加してください</div>'; return; }
  const stats=computeStats(ms);
  const todayKey=dateKey(new Date());
  const pct=stats.totalH>0?Math.round(stats.doneH/stats.totalH*100):0;
  const signalColor=stats.signal==='green'?'#5fae6e':stats.signal==='yellow'?'#e8c34a':'#d4574a';
  const signalLabel=stats.signal==='green'?'余裕あり':stats.signal==='yellow'?'ペース注意':'締切危険';
  const dayHours=calendarColors(ms);

  // カレンダーグリッド用日付
  const calDays=[];
  let cur=parseDate(ms.start), end=parseDate(ms.end);
  while(cur<=end){ calDays.push(dateKey(cur)); cur=addDays(cur,1); }
  const totalCalH=stats.totalH;

  // タブ
  let tabsHTML=STATE.manuscripts.map(m=>`
    <button class="tab ${m.id===STATE.activeId?'active':''}" onclick="switchTab('${m.id}')">${m.title}</button>
  `).join('');
  tabsHTML+=`<button class="tab" onclick="openAddForm()">＋</button>`;

  // カレンダーグリッド（月ごとに分割）
  const monthGroups={};
  calDays.forEach(k=>{ const m=k.slice(0,7); if(!monthGroups[m]) monthGroups[m]=[]; monthGroups[m].push(k); });
  let calHTML='';
  Object.entries(monthGroups).forEach(([ym, days])=>{
    const [y,m]=ym.split('-').map(Number);
    calHTML+=`<div style="font-size:12px;font-weight:700;color:#9b9389;padding:8px 12px 4px">${m}月</div>`;
    calHTML+='<div class="cal-grid">';
    WJ.forEach(w=>{ calHTML+=`<div style="font-size:10px;color:#9b9389;text-align:center;padding:4px 0">${w}</div>`; });
    const firstDow=parseDate(days[0]).getDay();
    for(let i=0;i<firstDow;i++) calHTML+='<div></div>';
    days.forEach(k=>{
      const d=parseDate(k);
      const h=dayHours[k]||0;
      const fillPct=totalCalH>0?Math.min(100,Math.round(h/totalCalH*100*calDays.length)):0;
      const isT=k===todayKey;
      const fillColor=isZero(k)?'#3a3a4a':h>0?'#d4744a':'#3a3640';
      calHTML+=`<div class="cal-cell ${isT?'today-cell':''}" title="${fmtDate(k)}">
        <div class="fill" style="height:${fillPct}%;background:${fillColor};opacity:0.7"></div>
        <span class="label" style="color:${isT?'#d4744a':h>0?'#e8e3d9':'#6b6660'}">${d.getDate()}</span>
      </div>`;
    });
    calHTML+='</div>';
  });

  // ミッションリスト
  const panelMap={};
  ms.panels.forEach(p=>{ panelMap[p.id]=p; });
  let listHTML='';
  calDays.forEach(dayKey=>{
    const isToday=dayKey===todayKey;
    const isPast=dayKey<todayKey;
    const zero=zeroLabel(dayKey);
    const early=isEarlyNight(dayKey);
    const panelIds=ms.schedule[dayKey]||[];
    const panels=panelIds.map(id=>panelMap[id]).filter(Boolean);
    const doneCnt=panels.filter(p=>p.locked).length;
    const allDone=panels.length>0&&doneCnt===panels.length;
    const isExpanded=expandedDay===dayKey;
    let tags='';
    if(isToday) tags+=`<span class="tag tag-today">TODAY</span>`;
    if(early) tags+=`<span class="tag tag-early" style="margin-left:6px">早寝</span>`;
    if(zero&&FIXED_ZERO[dayKey]) tags+=`<span class="tag tag-zero" style="margin-left:6px">${zero}</span>`;
    if(zero&&TENT_ZERO[dayKey]) tags+=`<span class="tag tag-zero-t" style="margin-left:6px">${zero}</span>`;
    if(allDone&&panels.length>0) tags+=`<span style="margin-left:6px;font-size:11px;color:#5fae6e">✓クリア</span>`;

    let bodyHTML='';
    if(isExpanded){
      let missionsHTML='';
      if(panels.length===0) missionsHTML=`<div style="font-size:13px;color:#6b6660;padding:4px 0">ミッションなし</div>`;
      panels.forEach(p=>{
        const diffOpts=['low','mid','high'].map(d=>`<option value="${d}" ${p.difficulty===d?'selected':''}>${d==='low'?'低':d==='mid'?'中':'高'}</option>`).join('');
        if(p.locked){
          missionsHTML+=`<div class="mission-row">
            <div class="check-btn done">✓</div>
            <span class="mission-label done">${p.page} ・ ${p.label}</span>
          </div>`;
        } else {
          missionsHTML+=`<div class="mission-row">
            <button class="check-btn" onclick="requestLock('${p.id}')"></button>
            <span class="mission-label">${p.page} ・ ${p.label}</span>
            <select class="diff-sel" onchange="changeDiff('${p.id}',this.value)">${diffOpts}</select>
          </div>`;
        }
      });
      bodyHTML=`<div class="day-body">${missionsHTML}</div>`;
    }

    listHTML+=`<div class="day-card ${isToday?'today':''} ${isPast&&!isToday?'past':''}">
      <button class="day-header" onclick="toggleDay('${dayKey}')">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:14px;font-weight:600;color:${isToday?'#d4744a':'inherit'}">${fmtDate(dayKey)}</span>
          ${tags}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${panels.length>0?`<span style="font-size:12px;color:#9b9389">${doneCnt}/${panels.length}</span>`:''}
          <span style="color:#9b9389;font-size:16px">${isExpanded?'▲':'▼'}</span>
        </div>
      </button>
      ${bodyHTML}
    </div>`;
  });

  // 設定パネル
  let settingsHTML='';
  if(showSettings){
    settingsHTML=`<div class="settings-panel">
      <div class="settings-row">
        <span style="font-size:13px">モード</span>
        <button onclick="toggleMode()" style="padding:6px 12px;border-radius:8px;border:1px solid #3a3640;background:#26222a;color:#e8e3d9;font-size:12px;cursor:pointer">
          ${ms.mode==='signal'?'信号→のんびりへ':'のんびり→信号へ'}
        </button>
      </div>
      <div class="settings-row">
        <span style="font-size:13px">締切日</span>
        <input type="date" value="${ms.deadline}" onchange="updateDeadline(this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #3a3640;background:#26222a;color:#e8e3d9;font-size:12px"/>
      </div>
      <button onclick="confirmDelete()" style="padding:8px;border-radius:8px;border:1px solid #5a3530;background:none;color:#d4574a;font-size:12px;cursor:pointer">この原稿タブを削除</button>
    </div>`;
  }

  app.innerHTML=`
    <div class="tab-bar">${tabsHTML}</div>
    <div class="header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:12px;color:#9b9389;margin-bottom:4px">締切まであと</div>
          <div class="countdown">${stats.daysLeft}<span style="font-size:14px;font-weight:400;color:#9b9389">日</span></div>
        </div>
        <button class="gear-btn" onclick="toggleSettings()">⚙</button>
      </div>
      ${settingsHTML}
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val">${stats.done}<span style="font-size:12px;color:#9b9389">/${stats.total}</span></div>
          <div class="stat-lbl">コマ完了</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="font-size:18px">${pct}<span style="font-size:12px;color:#9b9389">%</span></div>
          <div class="stat-lbl">進捗</div>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      ${ms.mode==='signal'?`
      <div class="signal-box">
        <div style="width:12px;height:12px;border-radius:50%;background:${signalColor};box-shadow:0 0 8px ${signalColor};flex-shrink:0"></div>
        <span style="font-size:13px;color:${signalColor};font-weight:600">${signalLabel}</span>
        <span style="font-size:12px;color:#9b9389;margin-left:4px">締切 ${ms.deadline.replace(/-/g,'/')}</span>
      </div>`:''}
      <button onclick="toggleCalendar()" style="width:100%;margin-top:10px;padding:8px;border-radius:10px;border:1px solid #3a3640;background:none;color:#9b9389;font-size:12px;cursor:pointer">
        ${showCalendar?'▲ カレンダーを閉じる':'▼ 進捗カレンダーを見る'}
      </button>
      ${showCalendar?calHTML:''}
    </div>
    <div class="section-list">${listHTML}</div>
    <div class="bottom-hint">日付タップで開閉 ・ ○タップで確定（取り消し不可）</div>
  `;

  // 確認ダイアログ
  if(confirmTarget){
    const p=getMs().panels.find(p=>p.id===confirmTarget);
    document.body.insertAdjacentHTML('beforeend',`
      <div class="dialog-overlay" id="confirm-dialog">
        <div class="dialog">
          <div style="font-size:15px;font-weight:700;margin-bottom:8px">🔒 このコマを確定しますか？</div>
          <div style="font-size:12px;color:#9b9389;margin-bottom:4px">${p?.page}</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:12px">${p?.label}</div>
          <div style="font-size:12px;color:#e8a456;margin-bottom:16px">一度確定すると変更できません。</div>
          <div style="display:flex;gap:8px">
            <button class="btn-primary" onclick="doLock()">確定する</button>
            <button class="btn-secondary" onclick="cancelLock()">やめる</button>
          </div>
        </div>
      </div>
    `);
  }

  if(deleteConfirm){
    document.body.insertAdjacentHTML('beforeend',`
      <div class="dialog-overlay">
        <div class="dialog">
          <div style="font-size:14px;margin-bottom:16px">「${getMs()?.title}」を削除します。本当によろしいですか？</div>
          <div style="display:flex;gap:8px">
            <button class="btn-danger" onclick="doDelete()">削除</button>
            <button class="btn-secondary" onclick="cancelDelete()">やめる</button>
          </div>
        </div>
      </div>
    `);
  }

  if(showAddForm){
    document.body.insertAdjacentHTML('beforeend',`
      <div class="dialog-overlay">
        <div class="dialog">
          <div style="font-size:15px;font-weight:700;margin-bottom:16px">新しい原稿を追加</div>
          <input id="new-title" placeholder="原稿名" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #3a3640;background:#1c1a1f;color:#e8e3d9;font-size:14px;margin-bottom:10px"/>
          <input id="new-deadline" type="date" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #3a3640;background:#1c1a1f;color:#e8e3d9;font-size:14px;margin-bottom:10px"/>
          <div style="display:flex;gap:8px;margin-bottom:16px">
            <button id="btn-easy" onclick="setNewMode('easy')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #d4744a;background:#3a2f28;color:#e8e3d9;font-size:13px;cursor:pointer">のんびり</button>
            <button id="btn-signal" onclick="setNewMode('signal')" style="flex:1;padding:8px;border-radius:8px;border:1px solid #3a3640;background:#1c1a1f;color:#e8e3d9;font-size:13px;cursor:pointer">信号モード</button>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn-primary" onclick="doAdd()">追加</button>
            <button class="btn-secondary" onclick="cancelAdd()">キャンセル</button>
          </div>
        </div>
      </div>
    `);
  }
}

// -------- イベントハンドラ --------
window.switchTab=function(id){ STATE.activeId=id; saveState(STATE); expandedDay=dateKey(new Date()); showSettings=false; render(); }
window.toggleDay=function(k){ expandedDay=expandedDay===k?null:k; render(); }
window.toggleSettings=function(){ showSettings=!showSettings; render(); }
window.toggleCalendar=function(){ showCalendar=!showCalendar; render(); }
window.toggleMode=function(){ const ms=getMs(); ms.mode=ms.mode==='signal'?'easy':'signal'; saveState(STATE); render(); }
window.updateDeadline=function(d){ getMs().deadline=d; saveState(STATE); render(); }

window.requestLock=function(id){ confirmTarget=id; render(); }
window.cancelLock=function(){ confirmTarget=null; const el=document.getElementById('confirm-dialog'); if(el) el.remove(); render(); }
window.doLock=function(){
  const ms=getMs();
  const p=ms.panels.find(p=>p.id===confirmTarget);
  if(p){ p.locked=true; ms.doneHours=(ms.doneHours||0)+DIFF_H[p.difficulty||'mid']; }
  // スケジュール再計算
  ms.schedule=buildSchedule(ms.panels, ms.start, ms.end);
  confirmTarget=null;
  saveState(STATE);
  launchConfetti();
  render();
}

window.changeDiff=function(id,diff){
  const ms=getMs();
  const p=ms.panels.find(p=>p.id===id);
  if(p){ p.difficulty=diff; ms.schedule=buildSchedule(ms.panels,ms.start,ms.end); saveState(STATE); render(); }
}

window.confirmDelete=function(){ deleteConfirm=true; render(); }
window.cancelDelete=function(){ deleteConfirm=false; const els=document.querySelectorAll('.dialog-overlay'); els.forEach(e=>e.remove()); render(); }
window.doDelete=function(){
  STATE.manuscripts=STATE.manuscripts.filter(m=>m.id!==STATE.activeId);
  if(STATE.manuscripts.length>0) STATE.activeId=STATE.manuscripts[0].id;
  deleteConfirm=false; showSettings=false; saveState(STATE); render();
}

let newMode='easy';
window.openAddForm=function(){ showAddForm=true; render(); }
window.cancelAdd=function(){ showAddForm=false; const els=document.querySelectorAll('.dialog-overlay'); els.forEach(e=>e.remove()); render(); }
window.setNewMode=function(m){
  newMode=m;
  const easy=document.getElementById('btn-easy');
  const sig=document.getElementById('btn-signal');
  if(easy&&sig){
    easy.style.borderColor=m==='easy'?'#d4744a':'#3a3640';
    easy.style.background=m==='easy'?'#3a2f28':'#1c1a1f';
    sig.style.borderColor=m==='signal'?'#d4744a':'#3a3640';
    sig.style.background=m==='signal'?'#3a2f28':'#1c1a1f';
  }
}
window.doAdd=function(){
  const title=document.getElementById('new-title')?.value?.trim();
  const deadline=document.getElementById('new-deadline')?.value;
  if(!title) return;
  const id='ms-'+Date.now();
  const start=dateKey(new Date());
  const end=deadline?dateKey(addDays(parseDate(deadline),-1)):dateKey(addDays(new Date(),30));
  STATE.manuscripts.push({id,title,mode:newMode,deadline:deadline||dateKey(addDays(new Date(),30)),start,end,panels:[],schedule:{},doneHours:0});
  STATE.activeId=id;
  showAddForm=false; newMode='easy';
  saveState(STATE); render();
}

render();
</script>
</body>
</html>
