const DIFF_H = { low:0.5, mid:1.5, high:3 };

// -------- 日付ユーティリティ --------
function dateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
const WJ=['日','月','火','水','木','金','土'];
function fmtDate(d){ return (d.getMonth()+1)+'/'+d.getDate()+'('+WJ[d.getDay()]+')'; }
function fmtFull(d){ return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+'('+WJ[d.getDay()]+')'; }

// -------- ゼロ日定義 --------
const FIXED_ZERO = {
  '2026-07-29':'ジム後・疲労',
  '2026-08-07':'ゴッホ展',
  '2026-08-30':'フェス＋食事',
};
const TENTATIVE_ZERO = {
  '2026-07-26':'コラボカフェ(仮)',
  '2026-08-17':'USJ(仮)',
  '2026-08-18':'USJ翌日(仮)',
};
// 月水金は早寝（夜作業ゼロ扱いだが日中作業可→ゼロ日には含めない、ラベルだけ表示）
function isEarlyNight(d){ const dow=d.getDay(); return dow===1||dow===3||dow===5; }
function isZeroDay(key){ return !!(FIXED_ZERO[key]||TENTATIVE_ZERO[key]); }
function zeroDayLabel(key){ return FIXED_ZERO[key]||TENTATIVE_ZERO[key]||null; }

// -------- スケジュール生成 --------
// 難易度バランスを考慮した配置：高→中→低を繰り返すパターンで均等化
function buildSchedule(panels, startDate, endDate) {
  // 使える日を収集
  const usableDays = [];
  let cur = new Date(startDate);
  while (cur <= endDate) {
    const key = dateKey(cur);
    if (!isZeroDay(key)) usableDays.push(key);
    cur = addDays(cur, 1);
  }
  if (usableDays.length === 0) return {};

  // 未完了パネルを難易度でソート：高→中→低を交互に配置
  const todo = panels.filter(p => !p.locked);
  // 難易度グループに分ける
  const high = todo.filter(p => p.difficulty === 'high');
  const mid  = todo.filter(p => p.difficulty === 'mid');
  const low  = todo.filter(p => p.difficulty === 'low');

  // インターリーブ：高1→中1→低1→高1→中1→低1...
  const ordered = [];
  const maxLen = Math.max(high.length, mid.length, low.length);
  for (let i = 0; i < maxLen; i++) {
    if (i < high.length) ordered.push(high[i]);
    if (i < mid.length)  ordered.push(mid[i]);
    if (i < low.length)  ordered.push(low[i]);
  }

  // 1日あたりのコマ数を計算（均等配分）
  const perDay = Math.max(1, Math.ceil(ordered.length / usableDays.length));
  const map = {};
  usableDays.forEach(d => { map[d] = []; });
  let idx = 0;
  for (const day of usableDays) {
    for (let i = 0; i < perDay && idx < ordered.length; i++) {
      map[day].push(ordered[idx].id);
      idx++;
    }
  }
  return map;
}

// -------- 信号色 --------
function signalInfo(schedule, panels, deadline, todayKey) {
  const remaining = panels.filter(p => !p.locked);
  if (remaining.length === 0) return { color:'#5fae6e', label:'完成！', emoji:'🎉' };
  // 今日以降の作業日を数える
  const futureDays = Object.keys(schedule).filter(k => k >= todayKey).length;
  const deadlineKey = deadline;
  const daysToDeadline = Math.round((parseDate(deadlineKey) - parseDate(todayKey)) / 86400000);
  // 残コマ総時間 vs 残日数×5h
  const remainH = remaining.reduce((s,p)=>s+DIFF_H[p.difficulty||'mid'],0);
  const availH = futureDays * 5;
  const ratio = availH > 0 ? remainH / availH : 999;
  if (ratio <= 0.6) return { color:'#5fae6e', label:'余裕あり', emoji:'🟢' };
  if (ratio <= 0.9) return { color:'#e8c34a', label:'ペース注意', emoji:'🟡' };
  return { color:'#d4574a', label:'締切危険', emoji:'🔴' };
}

// -------- 初期データ：10月本 --------
function buildOct() {
  function pp(pageLabel, panels){ return panels.map((p,i)=>({...p, id:pageLabel.replace(/\s/g,'')+'-c'+(i+1), page:pageLabel})); }
  function mk(n, panels){ return pp('P'+n, panels); }
  function auto(n, doneCount, diff){ return Array.from({length:n},(_,i)=>({label:(i+1)+'コマ目',difficulty:diff||'mid',locked:i<doneCount})); }

  const panels = [
    ...mk(1, [{label:'表紙',difficulty:'mid',locked:true}]),
    ...mk(2, [{label:'裏表紙',difficulty:'low',locked:true}]),
    ...mk(3, [{label:'1コマ目',difficulty:'mid',locked:false}]),
    ...mk(4, auto(4,4,'mid')),
    ...mk(5, [{label:'1コマ目',difficulty:'mid',locked:true},{label:'2コマ目',difficulty:'mid',locked:true},{label:'大ゴマ',difficulty:'high',locked:false}]),
    ...mk(6, auto(6,6,'mid')),
    ...mk(7, auto(5,5,'mid')),
    ...mk(8, [...auto(4,4,'mid'),{label:'5コマ目',difficulty:'mid',locked:false}]),
    ...mk(9, [...auto(3,3,'mid'),...auto(3,0,'mid').map((p,i)=>({...p,label:(4+i)+'コマ目'}))]),
    ...mk(10, [...auto(2,2,'mid'),{label:'3コマ目',difficulty:'high',locked:false},{label:'4コマ目',difficulty:'high',locked:false}]),
    ...mk(11, [...auto(4,4,'mid'),{label:'5コマ目',difficulty:'mid',locked:false},{label:'6コマ目',difficulty:'mid',locked:false}]),
    ...mk(12, [{label:'1コマ目',difficulty:'mid',locked:true},{label:'2コマ目',difficulty:'high',locked:false},{label:'3コマ目',difficulty:'high',locked:false},{label:'4コマ目',difficulty:'high',locked:false}]),
    ...mk(13, [{label:'1コマ目',difficulty:'mid',locked:false},...auto(5,5,'mid').map((p,i)=>({...p,label:(2+i)+'コマ目'}))]),
    ...mk(14, [{label:'1コマ目(下書き済)',difficulty:'mid',locked:false},...auto(4,0,'mid').map((p,i)=>({...p,label:(2+i)+'コマ目'}))]),
    ...mk(15, auto(4,0,'mid')),
    ...mk(16, [{label:'1コマ目',difficulty:'mid',locked:true},...auto(4,0,'mid').map((p,i)=>({...p,label:(2+i)+'コマ目'}))]),
    ...mk(17, auto(5,0,'mid')),
    ...mk(18, auto(5,0,'mid')),
    ...mk(19, auto(5,0,'mid')),
    ...mk(20, [...auto(3,3,'mid'),...auto(5,0,'mid').map((p,i)=>({...p,label:(4+i)+'コマ目'}))]),
    ...mk(21, auto(4,0,'mid')),
    ...mk(22, auto(6,0,'mid')),
    ...mk(23, [...auto(3,3,'mid'),{label:'4コマ目',difficulty:'mid',locked:false},{label:'5コマ目',difficulty:'mid',locked:false},{label:'6コマ目',difficulty:'mid',locked:false}]),
    ...mk(24, [{label:'1コマ目',difficulty:'mid',locked:false},...auto(3,0,'mid').map((p,i)=>({...p,label:(2+i)+'コマ目'}))]),
    ...mk(25, auto(5,0,'mid')),
    ...mk(26, auto(6,0,'mid')),
    ...mk(27, auto(5,0,'mid')),
    ...mk(28, auto(5,0,'mid')),
    ...mk(29, auto(4,0,'mid')),
    ...mk(30, auto(5,0,'mid')),
    ...mk(31, auto(7,0,'mid')),
    ...mk(32, auto(5,0,'mid')),
    ...mk(33, auto(4,0,'mid')),
  ];
  const start = new Date(2026,8,5); // 9月本終了後から
  const end   = new Date(2026,9,15);
  const unlocked = panels.filter(p=>!p.locked);
  const schedule = buildSchedule(unlocked.map(p=>({...p})), start, end);
  return { id:'oct', title:'10月 新刊', mode:'easy', deadline:'2026-10-16', start:'2026-09-05', end:'2026-10-15', panels, schedule };
}

function load() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){}
  return [buildSept(), buildOct()];
}
function save(data){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); }catch(e){} }

// -------- メインアプリ --------
function App() {
  const [mss, setMss] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [confirmPanel, setConfirmPanel] = useState(null); // {msId, panelId}
  const [showSettings, setShowSettings] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [newTitle, setNewTitle] = useState('');
  const [newDeadline, setNewDeadline] = useState('');
  const [newMode, setNewMode] = useState('easy');
  const [expandedDay, setExpandedDay] = useState(null);
  const [showEditPanel, setShowEditPanel] = useState(null);

  useEffect(()=>{
    const data = load();
    setMss(data);
    setActiveId(data[0]?.id||null);
    // 今日の日付のdayを自動で開く
    setExpandedDay(dateKey(new Date()));
    setLoaded(true);
  },[]);

  const persist = useCallback((next)=>{ save(next); },[]);

  const updateMs = (id, fn) => setMss(prev=>{ const next=prev.map(m=>m.id===id?fn(m):m); persist(next); return next; });

  // パネル確定
  const lockPanel = (msId, panelId) => {
    updateMs(msId, ms=>{
      const panels = ms.panels.map(p=>p.id===panelId?{...p,locked:true}:p);
      // 未完了のパネルでスケジュール再計算
      const start = parseDate(ms.start);
      const end   = parseDate(ms.end);
      const todo  = panels.filter(p=>!p.locked);
      const schedule = buildSchedule(todo, start, end);
      return {...ms, panels, schedule};
    });
    setConfirmPanel(null);
  };

  // 難易度変更
  const changeDiff = (msId, panelId, diff) => {
    updateMs(msId, ms=>{
      const panels = ms.panels.map(p=>p.id===panelId?{...p,difficulty:diff}:p);
      const start = parseDate(ms.start);
      const end   = parseDate(ms.end);
      const todo  = panels.filter(p=>!p.locked);
      const schedule = buildSchedule(todo, start, end);
      return {...ms, panels, schedule};
    });
  };

  // パネル追加
  const addPanel = (msId, pageLabel) => {
    updateMs(msId, ms=>{
      const samePage = ms.panels.filter(p=>p.page===pageLabel);
      const newPanel = {id:pageLabel.replace(/\s/g,'')+'-c'+Date.now(), page:pageLabel, label:(samePage.length+1)+'コマ目', difficulty:'mid', locked:false};
      const panels = [...ms.panels, newPanel];
      const start = parseDate(ms.start);
      const end   = parseDate(ms.end);
      const todo  = panels.filter(p=>!p.locked);
      const schedule = buildSchedule(todo, start, end);
      return {...ms, panels, schedule};
    });
  };

  const toggleMode = (msId) => updateMs(msId, ms=>({...ms, mode:ms.mode==='signal'?'easy':'signal'}));
  const updateDeadline = (msId, d) => updateMs(msId, ms=>({...ms, deadline:d}));

  const addMs = () => {
    if(!newTitle.trim()) return;
    const id='ms-'+Date.now();
    const start = newDeadline ? dateKey(addDays(parseDate(newDeadline),-30)) : dateKey(new Date());
    const end   = newDeadline ? dateKey(addDays(parseDate(newDeadline),-1)) : dateKey(addDays(new Date(),30));
    const fresh = {id, title:newTitle.trim(), mode:newMode, deadline:newDeadline||dateKey(addDays(new Date(),30)), start, end, panels:[], schedule:{}};
    setMss(prev=>{ const next=[...prev,fresh]; persist(next); return next; });
    setActiveId(id); setShowAddForm(false); setNewTitle(''); setNewDeadline(''); setNewMode('easy');
  };

  const deleteMs = (id) => {
    setMss(prev=>{ const next=prev.filter(m=>m.id!==id); persist(next); if(activeId===id&&next.length>0) setActiveId(next[0].id); return next; });
    setDeleteConfirm(null);
  };

  if(!loaded) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#9b9389'}}>読み込み中…</div>;

  const activeMs = mss.find(m=>m.id===activeId);

  return (
    <div style={{minHeight:'100vh'}}>
      {/* タブ */}
      <div style={{position:'sticky',top:0,zIndex:20,background:'rgba(28,26,31,0.97)',backdropFilter:'blur(8px)',borderBottom:'1px solid #3a3640'}}>
        <div style={{display:'flex',overflowX:'auto',padding:'10px 8px 0',gap:4}}>
          {mss.map(ms=>(
            <button key={ms.id} onClick={()=>setActiveId(ms.id)} style={{flexShrink:0,padding:'8px 14px',borderRadius:'10px 10px 0 0',border:'none',background:ms.id===activeId?'#26222a':'transparent',color:ms.id===activeId?'#e8e3d9':'#9b9389',fontSize:13,fontWeight:ms.id===activeId?600:400,cursor:'pointer',borderBottom:ms.id===activeId?'2px solid #d4744a':'2px solid transparent'}}>
              {ms.title}
            </button>
          ))}
          <button onClick={()=>setShowAddForm(true)} style={{flexShrink:0,padding:'8px 10px',background:'none',border:'none',color:'#9b9389',cursor:'pointer'}}><IcoPlus size={16}/></button>
        </div>
      </div>

      {/* 新規追加フォーム */}
      {showAddForm && (
        <div style={{padding:16,background:'#26222a',borderBottom:'1px solid #3a3640',display:'flex',flexDirection:'column',gap:10}}>
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="原稿名" style={{padding:'8px 10px',borderRadius:8,border:'1px solid #3a3640',background:'#1c1a1f',color:'#e8e3d9',fontSize:14}}/>
          <input type="date" value={newDeadline} onChange={e=>setNewDeadline(e.target.value)} style={{padding:'8px 10px',borderRadius:8,border:'1px solid #3a3640',background:'#1c1a1f',color:'#e8e3d9',fontSize:14}}/>
          <div style={{display:'flex',gap:8}}>
            {['easy','signal'].map(m=>(
              <button key={m} onClick={()=>setNewMode(m)} style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid '+(newMode===m?'#d4744a':'#3a3640'),background:newMode===m?'#3a2f28':'#1c1a1f',color:'#e8e3d9',fontSize:13,cursor:'pointer'}}>
                {m==='easy'?'のんびり':'信号モード'}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={addMs} style={{flex:1,padding:'8px',borderRadius:8,border:'none',background:'#d4744a',color:'#1c1a1f',fontWeight:600,fontSize:13,cursor:'pointer'}}>追加</button>
            <button onClick={()=>setShowAddForm(false)} style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid #3a3640',background:'none',color:'#9b9389',fontSize:13,cursor:'pointer'}}>キャンセル</button>
          </div>
        </div>
      )}

      {/* メインビュー */}
      {activeMs && (
        <ManuscriptView
          ms={activeMs}
          expandedDay={expandedDay}
          setExpandedDay={setExpandedDay}
          showSettings={showSettings}
          setShowSettings={setShowSettings}
          showEditPanel={showEditPanel}
          setShowEditPanel={setShowEditPanel}
          onRequestLock={(panelId)=>setConfirmPanel({msId:activeMs.id,panelId})}
          onChangeDiff={(panelId,diff)=>changeDiff(activeMs.id,panelId,diff)}
          onAddPanel={(pageLabel)=>addPanel(activeMs.id,pageLabel)}
          onToggleMode={()=>toggleMode(activeMs.id)}
          onUpdateDeadline={(d)=>updateDeadline(activeMs.id,d)}
          onRequestDelete={()=>setDeleteConfirm(activeMs.id)}
        />
      )}

      {/* 確定確認ダイアログ */}
      {confirmPanel && (()=>{
        const ms = mss.find(m=>m.id===confirmPanel.msId);
        const panel = ms?.panels.find(p=>p.id===confirmPanel.panelId);
        return (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:24}}>
            <div style={{background:'#26222a',borderRadius:16,padding:22,maxWidth:300,border:'1px solid #3a3640',width:'100%'}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>🔒 このコマを確定しますか？</div>
              <div style={{fontSize:13,color:'#9b9389',marginBottom:4}}>{panel?.page}</div>
              <div style={{fontSize:15,fontWeight:600,marginBottom:16}}>{panel?.label}</div>
              <div style={{fontSize:12,color:'#e8a456',marginBottom:16}}>一度確定すると変更できません。</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>lockPanel(confirmPanel.msId,confirmPanel.panelId)} style={{flex:1,padding:'10px',borderRadius:10,border:'none',background:'#d4744a',color:'#1c1a1f',fontWeight:700,fontSize:14,cursor:'pointer'}}>確定する</button>
                <button onClick={()=>setConfirmPanel(null)} style={{flex:1,padding:'10px',borderRadius:10,border:'1px solid #3a3640',background:'none',color:'#e8e3d9',fontSize:14,cursor:'pointer'}}>やめる</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* タブ削除確認 */}
      {deleteConfirm && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:24}}>
          <div style={{background:'#26222a',borderRadius:16,padding:22,maxWidth:300,border:'1px solid #3a3640',width:'100%'}}>
            <div style={{fontSize:14,marginBottom:16}}>「{mss.find(m=>m.id===deleteConfirm)?.title}」を削除します。本当によろしいですか？</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>deleteMs(deleteConfirm)} style={{flex:1,padding:'10px',borderRadius:10,border:'none',background:'#d4574a',color:'#fff',fontSize:14,cursor:'pointer'}}>削除</button>
              <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:'10px',borderRadius:10,border:'1px solid #3a3640',background:'none',color:'#e8e3d9',fontSize:14,cursor:'pointer'}}>やめる</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// -------- 原稿ビュー --------
function ManuscriptView({ ms, expandedDay, setExpandedDay, showSettings, setShowSettings, showEditPanel, setShowEditPanel, onRequestLock, onChangeDiff, onAddPanel, onToggleMode, onUpdateDeadline, onRequestDelete }) {
  const todayKey = dateKey(new Date());

  // スケジュールを日付リストに変換
  const allDays = useMemo(()=>{
    const days = [];
    let cur = parseDate(ms.start);
    const end = parseDate(ms.end);
    while(cur <= end){ days.push(dateKey(cur)); cur=addDays(cur,1); }
    return days;
  },[ms.start, ms.end]);

  const panelMap = useMemo(()=>{
    const m={};
    ms.panels.forEach(p=>{ m[p.id]=p; });
    return m;
  },[ms.panels]);

  const signal = useMemo(()=>{
    if(ms.mode!=='signal') return null;
    return signalInfo(ms.schedule, ms.panels, ms.deadline, todayKey);
  },[ms, todayKey]);

  // 完了コマ数
  const donePanels = ms.panels.filter(p=>p.locked).length;
  const totalPanels = ms.panels.length;
  const pct = totalPanels>0?Math.round(donePanels/totalPanels*100):0;

  // 完成予測日（のんびりモード用）
  const prediction = useMemo(()=>{
    const remaining = ms.panels.filter(p=>!p.locked);
    if(remaining.length===0) return null;
    const futureDays = allDays.filter(k=>k>=todayKey&&!isZeroDay(k));
    const perDay = ms.schedule ? Object.values(ms.schedule).filter(arr=>arr.length>0).length : 0;
    if(perDay===0||futureDays.length===0) return null;
    const remainPanels = remaining.length;
    const daysNeeded = Math.ceil(remainPanels / Math.max(1, remainPanels/Math.max(1,futureDays.length)));
    return addDays(new Date(), daysNeeded);
  },[ms, allDays, todayKey]);

  return (
    <div>
      {/* ヘッダー */}
      <div style={{padding:16,borderBottom:'1px solid #3a3640'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
          <div>
            <div style={{fontSize:12,color:'#9b9389',marginBottom:2}}>締切 {ms.deadline.replace(/-/g,'/')}</div>
            <div style={{fontSize:13,color:'#9b9389'}}>{donePanels}/{totalPanels} コマ完了</div>
          </div>
          <button onClick={()=>setShowSettings(!showSettings)} style={{background:'none',border:'none',padding:6,cursor:'pointer'}}><IcoGear size={18}/></button>
        </div>

        {/* プログレスバー */}
        <div style={{height:8,width:'100%',background:'#2e2a32',borderRadius:999,overflow:'hidden',marginBottom:10}}>
          <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#d4744a,#e8a456)',borderRadius:999,transition:'width 0.5s'}}/>
        </div>

        {/* 信号 or 予測 */}
        {ms.mode==='signal' && signal && (
          <div style={{padding:'10px 12px',borderRadius:10,background:'#2e2a32',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:12,height:12,borderRadius:'50%',background:signal.color,flexShrink:0,boxShadow:'0 0 6px '+signal.color}}/>
            <div style={{fontSize:13}}>
              <span style={{color:signal.color,fontWeight:600}}>{signal.label}</span>
              <span style={{color:'#9b9389',marginLeft:8,fontSize:12}}>締切 {ms.deadline.replace(/-/g,'/')}</span>
            </div>
          </div>
        )}
        {ms.mode==='easy' && (
          <div style={{padding:'10px 12px',borderRadius:10,background:'#2e2a32',fontSize:13,color:'#e8e3d9'}}>
            🌱 {prediction ? fmtDate(prediction)+'ごろ完成予測' : donePanels===totalPanels?'完成！':'計算中…'}
          </div>
        )}

        {/* 設定パネル */}
        {showSettings && (
          <div style={{marginTop:12,padding:12,borderRadius:10,background:'#1c1a1f',border:'1px solid #3a3640',display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:13}}>モード</span>
              <button onClick={onToggleMode} style={{padding:'6px 12px',borderRadius:8,border:'1px solid #3a3640',background:'#26222a',color:'#e8e3d9',fontSize:12,cursor:'pointer'}}>
                {ms.mode==='signal'?'信号→のんびりへ':'のんびり→信号へ'}
              </button>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:13}}>締切日</span>
              <input type="date" value={ms.deadline} onChange={e=>onUpdateDeadline(e.target.value)} style={{padding:'4px 8px',borderRadius:6,border:'1px solid #3a3640',background:'#26222a',color:'#e8e3d9',fontSize:12}}/>
            </div>
            <button onClick={onRequestDelete} style={{padding:'8px',borderRadius:8,border:'1px solid #5a3530',background:'none',color:'#d4574a',fontSize:12,cursor:'pointer'}}>この原稿タブを削除</button>
          </div>
        )}
      </div>

      {/* カレンダーリスト */}
      <div style={{padding:'12px',display:'flex',flexDirection:'column',gap:8,paddingBottom:80}}>
        {allDays.map(dayKey=>{
          const isToday = dayKey===todayKey;
          const isPast  = dayKey<todayKey;
          const isZero  = isZeroDay(dayKey);
          const zeroLabel = zeroDayLabel(dayKey);
          const early   = isEarlyNight(parseDate(dayKey));
          const panelIds = ms.schedule[dayKey]||[];
          const panels  = panelIds.map(id=>panelMap[id]).filter(Boolean);
          const doneCnt = panels.filter(p=>p.locked).length;
          const isExpanded = expandedDay===dayKey;
          const allDone = panels.length>0&&doneCnt===panels.length;

          return (
            <div key={dayKey} style={{borderRadius:12,border:'1px solid '+(isToday?'#d4744a':'#3a3640'),background:isPast&&!isToday?'rgba(28,26,31,0.6)':'#26222a',opacity:isPast&&!isToday?0.7:1}}>
              <button onClick={()=>setExpandedDay(isExpanded?null:dayKey)}
                style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'none',border:'none',color:'inherit',cursor:'pointer',font:'inherit',textAlign:'left'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                  <span style={{fontSize:14,fontWeight:600,color:isToday?'#d4744a':'inherit'}}>{fmtDate(parseDate(dayKey))}</span>
                  {isToday&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#d4744a',color:'#1c1a1f',fontWeight:700}}>TODAY</span>}
                  {early&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#3a3640',color:'#9b9389'}}>早寝</span>}
                  {zeroLabel&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:FIXED_ZERO[dayKey]?'#4a3530':'#3a3a4a',color:FIXED_ZERO[dayKey]?'#e8a456':'#a8b8e8'}}>{zeroLabel}</span>}
                  {allDone&&panels.length>0&&<span style={{fontSize:11,color:'#5fae6e'}}>✓ クリア</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  {panels.length>0&&<span style={{fontSize:12,color:'#9b9389'}}>{doneCnt}/{panels.length}</span>}
                  {isExpanded?<IcoChevU size={16}/>:<IcoChevD size={16}/>}
                </div>
              </button>

              {isExpanded&&(
                <div style={{borderTop:'1px solid #3a3640',padding:'8px 16px 14px',display:'flex',flexDirection:'column',gap:10}}>
                  {isZero&&panels.length===0&&(
                    <div style={{fontSize:13,color:'#6b6660',padding:'4px 0'}}>作業なし</div>
                  )}
                  {panels.map(panel=>(
                    <div key={panel.id} style={{display:'flex',alignItems:'center',gap:12}}>
                      {panel.locked ? (
                        <div style={{width:22,height:22,borderRadius:'50%',background:'#3a3640',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                          <span style={{fontSize:11,color:'#5fae6e'}}>✓</span>
                        </div>
                      ) : (
                        <button onClick={()=>onRequestLock(panel.id)} style={{width:22,height:22,borderRadius:'50%',border:'2px solid #5a5560',background:'none',cursor:'pointer',flexShrink:0,padding:0}}/>
                      )}
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:panel.locked?'#6b6660':'#e8e3d9',textDecoration:panel.locked?'line-through':'none'}}>{panel.page} ・ {panel.label}</div>
                      </div>
                      {!panel.locked&&(
                        <select value={panel.difficulty} onChange={e=>onChangeDiff(panel.id,e.target.value)}
                          style={{fontSize:11,padding:'3px 6px',borderRadius:6,border:'1px solid #3a3640',background:'#1c1a1f',color:'#9b9389',cursor:'pointer'}}>
                          <option value="low">低</option>
                          <option value="mid">中</option>
                          <option value="high">高</option>
                        </select>
                      )}
                    </div>
                  ))}
                  {panels.length===0&&!isZero&&(
                    <div style={{fontSize:13,color:'#6b6660'}}>この日のミッションはありません</div>
                  )}
                  {/* ページ別コマ追加ボタン */}
                  {panels.length>0&&(()=>{
                    const pages=[...new Set(panels.map(p=>p.page))];
                    return pages.map(pageLabel=>(
                      <button key={pageLabel} onClick={()=>onAddPanel(pageLabel)} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'1px dashed #3a3640',background:'none',color:'#9b9389',cursor:'pointer',alignSelf:'flex-start'}}>
                        ＋{pageLabel}にコマ追加
                      </button>
                    ));
                  })()}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(28,26,31,0.95)',backdropFilter:'blur(8px)',borderTop:'1px solid #3a3640',padding:'10px 16px',fontSize:12,color:'#9b9389',textAlign:'center'}}>
        日付タップで開閉 ・ ○タップで確定（取り消し不可）
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
